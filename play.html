<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>播放 · 阿布 Jumboo</title>
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Sora:wght@400;500&family=Literata:opsz,wght@7..72,400&display=swap" rel="stylesheet" />
  <style>
    :root {
      --cream: #f4efe6;
      --slate: #3d4f52;
      --coral: #d97b6a;
      --ease: cubic-bezier(0.16, 1, 0.3, 1);
    }
    * { box-sizing: border-box; }
    body {
      margin: 0;
      min-height: 100vh;
      font-family: "Literata", Georgia, serif;
      background: linear-gradient(165deg, #eef6f3, var(--cream));
      color: #2a3335;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      padding: 2rem;
    }
    a.back {
      font-family: "Sora", sans-serif;
      font-size: 0.72rem;
      letter-spacing: 0.2em;
      text-transform: uppercase;
      color: var(--slate);
      text-decoration: none;
      margin-bottom: 2rem;
      opacity: 0.75;
      transition: opacity 0.35s var(--ease), transform 0.35s var(--ease);
    }
    a.back:hover { opacity: 1; transform: translateX(-4px); }
    .stage {
      width: min(100%, 880px);
      aspect-ratio: 16 / 9;
      background: linear-gradient(145deg, #c5e0d8, #e8b8a8, #d4c4e0);
      border-radius: 2px;
      box-shadow: 0 24px 48px rgba(61, 79, 82, 0.15);
      display: grid;
      place-items: center;
      position: relative;
      overflow: hidden;
    }
    .stage::after {
      content: "";
      position: absolute;
      inset: 0;
      background: radial-gradient(circle at 30% 30%, rgba(255,255,255,0.25), transparent 50%);
      pointer-events: none;
    }
    .placeholder {
      font-family: "Sora", sans-serif;
      font-size: 0.85rem;
      letter-spacing: 0.08em;
      color: rgba(42, 51, 53, 0.65);
      text-align: center;
      padding: 1rem;
      z-index: 1;
    }
    h1 {
      font-family: "Sora", sans-serif;
      font-weight: 400;
      font-size: 1.35rem;
      margin: 1.5rem 0 0.35rem;
      color: var(--slate);
    }
    .id-tag {
      font-size: 0.85rem;
      opacity: 0.65;
    }
  </style>
</head>
<body>
  <a class="back" href="preview.html">← 返回主页</a>
  <div class="stage" role="img" aria-label="视频占位区域">
    <p class="placeholder">此处嵌入视频播放器<br />（&lt;video&gt; 或 iframe）</p>
  </div>
  <h1 id="title">作品</h1>
  <p class="id-tag" id="meta"></p>
  <script>
    (function () {
      // 根据 URL 参数展示标题（预览用，正式站可改为接口数据）
      var params = new URLSearchParams(location.search);
      var id = params.get("id") || "1";
      var titles = {
        "1": "雾岛日出",
        "2": "几何回信",
        "3": "沉默的拱门",
        "4": "褪色塔楼"
      };
      document.getElementById("title").textContent = titles[id] || "作品";
      document.getElementById("meta").textContent = "作品 ID: " + id + " · Preview";
    })();
  </script>
</body>
</html>
